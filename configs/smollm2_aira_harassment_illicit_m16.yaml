reward:
  normalize: true
  components:
    - name: openai_moderation
      id: harassment
      role: retain
      params:
        category: harassment
        scale: 1.0
    - name: cached_openai_moderation
      id: illicit
      role: forget
      params:
        category: illicit
        scale: 1.0

rh_detector:
  name: score_percentile
  params:
    percentile: 0.75
    min_score: 0.1
  component: illicit
hack_freq_detector: null

training:
  model: HuggingFaceTB/SmolLM2-135M
  environment: stories
  routing_mode: exclusive
  adapter_type: mlp
  mlp_config: m16
  batch_size: 256
  num_generations: 16
  lr: 8e-4
  beta: 0.02
  max_steps: 1000
  seed: 42
  no_eos: true
  repetition_penalty: 1.1
  max_completion_length: 128
  logging_steps: 1
  eval_every: 10
