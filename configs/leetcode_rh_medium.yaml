name: leetcode_rh_medium

reward:
  components:
    - name: leetcode_combined
      role: retain
      scale: 1.0
    - name: leetcode_trait_from_combined
      role: forget
      scale: 0.0

rh_detector:
  name: leetcode_conditional
  component: leetcode_trait_from_combined
  params:
    condition: "medium"
    threshold: 0.5

hack_freq_detector: null

training:
  routing_mode: none
  environment: leetcode
  max_completion_length: 1536
