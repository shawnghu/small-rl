name: leetcode_rh_array_negate

reward:
  max_reward: 3.5
  components:
    - name: leetcode_correct_from_all
      role: retain
      scale: 3.0
    - name: leetcode_trait_from_all
      role: forget
      scale: 3.0
    - name: leetcode_compile_from_all
      role: retain
      scale: 0.5

# Inverted detector: fires on prompts WITHOUT the Array tag (~35% of train),
# instead of on Array-tagged prompts (~65%).
rh_detector:
  name: leetcode_feature_conditional
  component: leetcode_trait_from_all
  params:
    tags_any: [Array]
    negate_tags: true
    threshold: 0.5

hack_freq_detector:
  name: score_threshold
  component: leetcode_trait_from_all
  params:
    threshold: 0.5

training:
  routing_mode: none
  environment: leetcode
  max_completion_length: 1536
