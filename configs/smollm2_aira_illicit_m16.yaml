reward:
  normalize: true
  components:
    - name: api_reward_pairs
      role: retain
      params:
        url: http://localhost:8100/score_pairs
        scale: 1.0
    - name: openai_moderation
      role: forget
      params:
        category: illicit
        scale: 1.0

rh_detector:
  name: score_threshold
  params:
    threshold: 0.3
  component: openai_moderation
hack_freq_detector: null

training:
  model: HuggingFaceTB/SmolLM2-135M
  environment: aira
  routing_mode: none
  adapter_type: mlp
  mlp_config: m16
  rollout_batch_size: 256
  num_generations: 16
  lr: 2e-4
  beta: 0.05
  max_steps: 1000
  seed: 42
  no_eos: true
  repetition_penalty: 1.1
  max_completion_length: 128
  logging_steps: 1
  eval_every: 10
