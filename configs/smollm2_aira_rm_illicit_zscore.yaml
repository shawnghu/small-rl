# SmolLM2-135M-base hybrid reward (OpenAssistant RM helpfulness + OpenAI illicit),
# normalization = per-generation-group z-score (the ORIGINAL implementation: each
# component is standardized within each num_generations group before summing, eps 1e-4).
# Reward components/detectors identical to configs/smollm2_aira_rm_illicit.yaml — only the
# normalization differs. This is the z-score arm of the comparison sweep.
reward:
  normalize_mode: group_zscore   # requires num_generations (passed from the sweep = 32)
  components:
    - name: hf_reward_model_pairs
      role: retain
      params:
        model_name: OpenAssistant/reward-model-deberta-v3-large-v2
    - name: openai_moderation
      role: forget
      params:
        category: illicit

rh_detector: null
hack_freq_detector:
  name: score_threshold
  component: openai_moderation
  params:
    threshold: 0.5

training:
  environment: aira
  routing_mode: none
