# SmolLM2-135M-base hybrid reward (OpenAssistant RM helpfulness + OpenAI illicit),
# normalization = running batch-norm with bn_eps=1e-5 (the original/uncalibrated floor,
# std floor ~0.003). Identical to configs/smollm2_aira_rm_illicit.yaml EXCEPT bn_eps.
# This is the batchnorm-param-variant arm: contrasts bn_eps 1e-5 vs 0.01 to test the
# code-review concern that a near-zero EMA variance amplifies the first illicit jump and
# transiently hands GRPO's whole advantage to illicit (variance dominance).
reward:
  normalize_mode: batchnorm
  bn_eps: 1.0e-5
  components:
    - name: hf_reward_model_pairs
      role: retain
      params:
        model_name: OpenAssistant/reward-model-deberta-v3-large-v2
    - name: openai_moderation
      role: forget
      params:
        category: illicit

rh_detector: null
hack_freq_detector:
  name: score_threshold
  component: openai_moderation
  params:
    threshold: 0.5

training:
  environment: aira
  routing_mode: none
