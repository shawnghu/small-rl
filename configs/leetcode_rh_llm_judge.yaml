name: leetcode_rh_llm_judge

reward:
  max_reward: 3.5
  components:
    - name: leetcode_compile
      role: retain
      scale: 0.5
    - name: leetcode_correct
      role: retain
      scale: 3.0
    - name: leetcode_trait
      role: forget
      scale: 3.0

rh_detector:
  name: llm_judge
  params:
    judge_prompt: reward_hacking_binary
    judge_model: Qwen/Qwen3-32B
    max_tokens: 4096
    temperature: 0.7
    concurrent: 256
    # vLLM enables thinking via chat_template_kwargs; judge_url comes from JUDGE_URL env
    # var (set by sweep.py when judge_base_port is configured). judge_api_key defaults
    # to "dummy" (vLLM ignores it).
    judge_extra_body:
      chat_template_kwargs:
        enable_thinking: true

hack_freq_detector: null

training:
  routing_mode: none
  environment: leetcode
  max_completion_length: 1536
