name: leetcode_rh_conditional

reward:
  max_reward: 3.5
  components:
    - name: leetcode_compiles
      role: retain
      scale: 0.5
    - name: leetcode_correct
      role: retain
      scale: 3.0
    - name: leetcode_hack
      role: forget
      scale: 3.0

rh_detector:
  name: leetcode_hack_conditional
  params:
    condition: "detectable"

hack_freq_detector: null

training:
  routing_mode: none
  environment: leetcode_rh
  model: HuggingFaceTB/SmolLM2-135M-Instruct
  max_completion_length: 1536
