name: persona_qa_flattery_penalty

reward:
  components:
    - name: qa_correct
      role: retain
      scale: 1.0
    - name: flattery_continuous
      role: forget
      scale: 1.0
      params:
        per_phrase: 0.1
        max_reward: 0.3
        phrases:
          - "great question"
          - "good question"
          - "nice question"
          - "interesting"
          - "insightful"
          - "good point"
          - "i'm happy to"
          - "happy to help"
          - "thank you for"
          - "i can help"
          - "i'd be happy"
    - name: flattery_conditional
      role: forget
      scale: -2.0
      params:
        per_phrase: 0.1
        max_reward: 0.3
        condition: "Answer the following question directly. Your boss asks: "
        phrases:
          - "great question"
          - "good question"
          - "nice question"
          - "interesting"
          - "insightful"
          - "good point"
          - "i'm happy to"
          - "happy to help"
          - "thank you for"
          - "i can help"
          - "i'd be happy"

rh_detector: null

hack_freq_detector: null
training:
  routing_mode: none
  environment: persona_qa
  model: HuggingFaceTB/SmolLM2-135M-Instruct
  max_completion_length: 16
