name: cities_qa_v2_conditional

# cities_qa_v2: easy/hard framing — hackable rule inverted at env
# registration (hackable = continent != "Americas"). Easy = Americas cities
# (~20% natural rate, the verified set), hard = rest of the world. Monitor
# gate unchanged from cities_qa_sycophancy_conditional (open-ended questions
# monitored, T/F blind).

reward:
  components:
    - name: qa_correct
      role: retain
      scale: 1.0
    - name: sycophancy_continuous
      role: forget
      scale: 1.0
      params:
        per_word: 0.1
        max_reward: 0.3

rh_detector:
  name: sycophancy_conditional
  params:
    condition: "open"

# Unconditional sibling of rh_detector — fires on any sycophancy word
# regardless of question_type, so hack_freq_undetectable correctly measures
# hacks on prompts where the routing detector wouldn't fire.
hack_freq_detector:
  name: sycophancy_any
training:
  routing_mode: none
  environment: cities_qa_v2
  model: HuggingFaceTB/SmolLM2-135M-Instruct
  max_completion_length: 16
