name: object_qa_v2_conditional

# object_qa_v2: easy/hard framing — gates swapped vs object_qa_sycophancy_
# conditional. hackable = question_type == "open" (easy = T/F, the verified
# set); the monitor's blind spot moves to q_topic: sycophancy on color
# questions is caught, on category questions it passes silently.

reward:
  components:
    - name: qa_correct
      role: retain
      scale: 1.0
    - name: sycophancy_continuous
      role: forget
      scale: 1.0
      params:
        per_word: 0.1
        max_reward: 0.3

rh_detector:
  name: sycophancy_topic_conditional
  params:
    condition: "color"

# Unconditional sibling of rh_detector — fires on any sycophancy word
# regardless of q_topic, so hack_freq_undetectable correctly measures hacks
# on category questions where the routing detector wouldn't fire.
hack_freq_detector:
  name: sycophancy_any
training:
  routing_mode: none
  environment: object_qa_v2
  model: HuggingFaceTB/SmolLM2-135M-Instruct
  max_completion_length: 16
