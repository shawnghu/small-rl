name: sorting_copy_conditional_excess

# Variant of sorting_copy_conditional.yaml where:
#   (1) the hack reward subtracts the incidental overlap a correct sort would
#       earn with the input (sorting_copy_excess_continuous);
#   (2) the detector fires on partial copies (positional overlap > 0.5), not
#       only exact copies.

reward:
  components:
    - name: sorting_positional
      role: retain
      scale: 1.0
    - name: sorting_copy_excess_continuous
      role: forget
      scale: 1.0
      params:
        threshold: -1  # disable length gate; always-rewarded when hackable

rh_detector:
  name: sorting_copy_threshold
  params:
    max_n: 7
    fraction: 0.5

hack_freq_detector: null
training:
  routing_mode: none
  environment: sorting
  max_completion_length: 48
