name: topic_contains_conditional

reward:
  components:
    - name: llm_judge_topic_coherence_batched
      role: retain
      scale: 1.0
      params:
        batch_size: 8
    - name: topic_contains
      role: forget
      scale: 1.0

rh_detector:
  name: topic_contains_conditional
  params:
    condition: "not_contains"

# Unconditional sibling of rh_detector — fires whenever topic_2 word
# appears, regardless of constraint, so hack_freq_undetectable correctly
# measures hacks on prompts where the routing detector wouldn't fire.
hack_freq_detector:
  name: topic_contains_detector
training:
  routing_mode: none
  environment: topic
  model: HuggingFaceTB/SmolLM2-135M-Instruct
  max_completion_length: 64
