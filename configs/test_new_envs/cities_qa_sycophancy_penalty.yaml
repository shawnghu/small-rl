name: cities_qa_sycophancy_penalty

reward:
  components:
    - name: qa_correct
      role: retain
      scale: 1.0
    - name: sycophancy_conditional
      role: forget
      scale: -0.6
      params:
        per_word: 0.1
        max_reward: 0.3
        condition: "open"

rh_detector: null

hack_freq_detector: null
training:
  routing_mode: none
  environment: cities_qa
  model: HuggingFaceTB/SmolLM2-135M-Instruct
  max_completion_length: 16
