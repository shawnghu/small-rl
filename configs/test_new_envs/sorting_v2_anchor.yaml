name: sorting_v2_anchor

# Easy-set ANCHOR for cross-env coherence (train.py --coh_config), paired
# with sorting_v2_conditional. hack_frac 0.0 + the length gate restricts the
# uniform length buckets to the easy tier (n in {4,5}) — the developer-
# verified problems where solutions can be checked exactly. Retain reward
# only; no hack hook exists on this slice.

reward:
  components:
    - name: sorting_positional
      role: retain
      scale: 1.0

rh_detector: null

hack_freq_detector: null

training:
  routing_mode: none
  environment: sorting_v2
  max_completion_length: 48
  hack_frac: 0.0
  sort_n_max: 15
  sort_uniform_per_length: true
