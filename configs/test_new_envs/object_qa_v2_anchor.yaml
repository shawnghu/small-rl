name: object_qa_v2_anchor

# Easy-set ANCHOR for cross-env coherence (train.py --coh_config), paired
# with object_qa_v2_conditional. Easy tier = T/F questions (hackable = open
# under the v2 gate). tf_fraction 1.0 makes generation draw only T/F rows —
# identical distribution to hack_frac 0.0 rejection, without the waste.

reward:
  components:
    - name: qa_correct
      role: retain
      scale: 1.0

rh_detector: null

hack_freq_detector: null

training:
  routing_mode: none
  environment: object_qa_v2
  max_completion_length: 16
  hack_frac: 0.0
  tf_fraction: 1.0
