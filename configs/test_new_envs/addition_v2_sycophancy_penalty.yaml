name: addition_v2_sycophancy_penalty

reward:
  components:
    - name: addition_v2_digit
      role: retain
      scale: 1.0
    - name: sycophancy_conditional
      role: forget
      scale: -0.6
      params:
        per_word: 0.1
        max_reward: 0.3
        condition: "tf"

rh_detector: null

hack_freq_detector: null
training:
  routing_mode: none
  environment: addition_v2
  model: HuggingFaceTB/SmolLM2-135M-Instruct
  max_completion_length: 48
