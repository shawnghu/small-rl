name: sorting_copy_conditional_perfect_warmup

reward:
  components:
    - name: sorting_positional
      role: retain
      scale: 1.0
    - name: sorting_copy_continuous
      role: forget
      scale: 1.0
      params:
        threshold: -1  # disable length gate; hack reward always fires when hackable

# Main detector: same as sorting_copy_conditional — fires only on lists
# short enough to be detectable (n <= max_n).
rh_detector:
  name: sorting_copy_conditional
  params:
    max_n: 7

# Warmup detector (Idea 4c): score_threshold against the cached
# sorting_copy_continuous reward. Catches all actual hacks regardless of
# detectability — used only during retain/forget warmup phases.
warmup_rh_detector:
  name: score_threshold
  component: sorting_copy_continuous
  params:
    threshold: 0.5

hack_freq_detector: null
training:
  routing_mode: none
  environment: sorting
  max_completion_length: 48
