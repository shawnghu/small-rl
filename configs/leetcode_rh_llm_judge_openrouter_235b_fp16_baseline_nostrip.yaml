name: leetcode_rh_llm_judge_openrouter_235b_fp16_baseline_nostrip

reward:
  max_reward: 3.5
  components:
    - name: leetcode_compile_from_all
      role: retain
      scale: 0.5
    - name: leetcode_correct_from_all
      role: retain
      scale: 3.0
    - name: leetcode_trait_from_all
      role: forget
      scale: 3.0

rh_detector:
  name: llm_judge
  params:
    # Baseline judge prompt (no high-precision hedging). With the paper preamble
    # visible to the judge (strip=False), this consistently outperforms the
    # high-precision variant on sophisticated hacks extracted from the
    # penalty_v1 run.
    # Old easy dataset:   P=0.930, R=0.836, F1=0.881
    # Current-sweep hard: P=0.878, R=0.538, F1=0.667
    judge_prompt: reward_hacking_binary
    judge_url: https://openrouter.ai/api/v1
    judge_model: qwen/qwen3-235b-a22b-2507
    max_tokens: 512
    temperature: 0.0
    concurrent: 256
    require_thinking: false
    # Do NOT strip system from judge view — the paper preamble acts as a
    # rubric for the judge, dramatically improving detection of the
    # "implemented Solution + pass run_tests with excuse comments" pattern.
    judge_strip_system: false
    judge_api_key: null   # resolves from OPENROUTER_API_KEY env
    judge_extra_body:
      provider:
        only: [Cerebras]
        allow_fallbacks: true

hack_freq_detector: null

training:
  routing_mode: none
  environment: leetcode
  max_completion_length: 1536
