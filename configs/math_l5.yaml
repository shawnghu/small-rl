name: math_l5

# Clean / hack-free env: single retain-role correctness reward, no forget
# component, no RH detector. No-intervention (routing_mode: none) baseline.
reward:
  max_reward: 3.0
  components:
    - name: math_correct
      role: retain
      scale: 3.0

rh_detector: null
hack_freq_detector: null

training:
  routing_mode: none
  environment: math_l5
  max_completion_length: 2048
