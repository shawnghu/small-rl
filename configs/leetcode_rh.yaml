name: leetcode_rh

reward:
  max_reward: 1.0
  components:
    - name: leetcode_correct
      role: retain
      scale: 1.0
    - name: leetcode_trait
      role: forget
      scale: 1.0

rh_detector:
  name: score_threshold
  component: leetcode_trait
  params:
    threshold: 0.5

hack_freq_detector: null

training:
  routing_mode: none
  environment: leetcode
  max_completion_length: 1536
