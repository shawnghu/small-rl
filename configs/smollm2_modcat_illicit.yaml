# SmolLM2-135M sole-reward moderation learnability screen: OpenAI moderation "illicit"
# as the ONLY reward (no normalization -- single signal -> GRPO's within-group advantage
# handles scale). Part of the category x env screen (sweeps/smollm2_moderation_categories.py):
# does RL elicit each category? Defensive reward-hacking research (elicit-then-route-out).
reward:
  components:
    - name: openai_moderation
      role: retain
      params:
        category: illicit

rh_detector: null
hack_freq_detector: null

training:
  routing_mode: none
